global
    daemon

defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http_front
    bind *:80
    default_backend drupal_backend

backend drupal_backend
    balance roundrobin
    server drupal1 drupal1:80 check
    server drupal2 drupal2:80 check

listen stats
    bind *:8404
    stats enable
    stats uri /haproxy_status
    stats refresh 10s

